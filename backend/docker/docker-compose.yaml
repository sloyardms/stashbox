# ===========================
# Stashbox Docker Compose File
# ===========================
name: stashbox
services:
  # ===========================
  # Stashbox content database
  # ===========================

  # BACKEND DATABASE
  postgresql-backend:
    image: postgres:18.0
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BACKEND_DB_NAME:-stashboxdb}
      POSTGRES_USER: ${BACKEND_DB_USER:-stashboxdbuser}
      POSTGRES_PASSWORD: ${BACKEND_DB_PASSWORD:-stashboxdbpassword}
    networks:
      - stashbox-network
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgresql_backend:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ===========================
  # Keycloak services
  # ===========================

  # KEYCLOAK DATABASE
  postgresql-keycloak:
    image: postgres:18.0
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloakdbuser}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloakdbpassword}
    networks:
      - stashbox-network
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgresql_keycloak:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # KEYCLOAK CORE SERVICE
  keycloak:
    image: keycloak/keycloak:26.4
    restart: unless-stopped
    command: >
      start-dev
      --import-realm
      --cache=local
    #command: start --optimized
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgresql-keycloak
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloakdbuser}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloakdbpassword}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-keycloakadmin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-keycloakpassword}
    networks:
      - stashbox-network
    ports:
      - "8085:8080" # HTTP & ADMIN
    volumes:
      - ./init-config/keycloak:/opt/keycloak/data/import
    depends_on:
      postgresql-keycloak:
        condition: service_healthy

networks:
  stashbox-network:
    driver: bridge

